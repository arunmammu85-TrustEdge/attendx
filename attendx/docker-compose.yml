# ── AttendX — docker-compose.yml ─────────────────────────────────────────────
version: "3.9"

services:

  # ── Backend API ──────────────────────────────────────────────────────────
  attendx-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendx-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OFFICE_LAT=${OFFICE_LAT:-17.3850}
      - OFFICE_LON=${OFFICE_LON:-78.4867}
      - FENCE_RADIUS=${FENCE_RADIUS:-500}
      - FACE_THRESHOLD=${FACE_THRESHOLD:-0.42}
      - TEST_MODE=false   # SET TO false IN PRODUCTION!
    volumes:
      - insightface_models:/root/.insightface
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (Nginx with HTTPS) ──────────────────────────────────────────
  attendx-frontend:
    image: nginx:alpine
    container_name: attendx-frontend
    restart: unless-stopped
    ports:
      - "3000:80"     # HTTP  → redirects to HTTPS
      - "3443:443"    # HTTPS → camera works on mobile
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # self-signed cert
    depends_on:
      - attendx-api

volumes:
  insightface_models:
    driver: local