server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index login.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Serve frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ → backend container
    # e.g. /api/attendance/punch → http://attendx-api:8000/attendance/punch
    location /api/ {
        proxy_pass         http://attendx-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Allow large image uploads (webcam snapshots ~200KB)
        client_max_body_size 10M;

        # Enough time for InsightFace to process (~5s)
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;

        # CORS headers — allow browser requests from port 3000
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight OPTIONS request
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}