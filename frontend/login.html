<!DOCTYPE html>
<html lang="en">
<head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(reg) { reg.unregister(); }); });
}
if ('caches' in window) {
  caches.keys().then(function(n) { n.forEach(function(name) { caches.delete(name); }); });
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendX — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0d12; --surface:#111620; --surface2:#161d2a; --border:#1e2a3a;
  --accent:#00e5a0; --accent2:#3b82f6; --accent3:#f59e0b; --danger:#ef4444;
  --text:#e8edf5; --muted:#5a6a7e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);
  background-size:40px 40px;
}
.blob { position:fixed; border-radius:50%; pointer-events:none; z-index:0; }
.blob1 { width:500px; height:500px; background:radial-gradient(circle,rgba(0,229,160,0.07),transparent 70%); top:-150px; left:-150px; }
.blob2 { width:400px; height:400px; background:radial-gradient(circle,rgba(59,130,246,0.07),transparent 70%); bottom:-100px; right:-100px; }

/* HEADER */
header {
  position:relative; z-index:10;
  background:rgba(10,13,18,0.9); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 2rem; height:60px;
  display:flex; align-items:center; justify-content:space-between;
}
.h-left { display:flex; align-items:center; gap:0.75rem; }
.h-logo { height:36px; width:70px; border-radius:7px; object-fit:cover; }
.h-brand { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; }
.h-brand span { color:var(--accent); }
.h-div { width:1px; height:24px; background:var(--border); }
.h-contact { display:flex; flex-direction:column; gap:1px; }
.h-contact a { font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--accent2); text-decoration:none; }
.h-contact a:hover { color:var(--accent); }
.clock { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); display:flex; flex-direction:column; align-items:flex-end; line-height:1.3; }

/* MAIN */
main {
  flex:1; position:relative; z-index:1;
  display:flex; align-items:center; justify-content:center; padding:2rem 1rem;
}
.wrap { width:100%; max-width:420px; margin:0 auto; }


/* LOGIN BOX */
.login-box { width:100%; }

/* CARD */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:1.5rem; margin-bottom:0.75rem;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.card:hover { border-color:rgba(0,229,160,0.2); }
.card-head { display:flex; align-items:center; gap:0.85rem; margin-bottom:1.1rem; }
.card-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
.ci-emp { background:rgba(0,229,160,0.12); border:1px solid rgba(0,229,160,0.2); }
.card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; }
.card-sub { font-size:0.75rem; color:var(--muted); font-family:'DM Mono',monospace; }

/* INPUT */
.input-wrap { position:relative; margin-bottom:0.6rem; }
.inp {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; color:var(--text); padding:0.7rem 2.8rem 0.7rem 0.9rem;
  font-size:0.875rem; font-family:'Instrument Sans',sans-serif; outline:none; transition:border-color 0.2s;
}
.inp:focus { border-color:var(--accent); }
.inp::placeholder { color:var(--muted); }
.inp-btn {
  position:absolute; right:7px; top:50%; transform:translateY(-50%);
  background:var(--accent); border:none; border-radius:6px;
  width:28px; height:28px; cursor:pointer; color:#000; font-size:1rem;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.inp-btn:hover { background:#00c988; }

/* BTN */
.btn {
  width:100%; padding:0.75rem; border-radius:9px; border:none;
  font-family:'Syne',sans-serif; font-weight:700; font-size:0.88rem;
  cursor:pointer; transition:all 0.2s;
}
.btn-emp { background:linear-gradient(135deg,var(--accent),#00b87a); color:#000; box-shadow:0 4px 14px rgba(0,229,160,0.25); }
.btn-emp:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,229,160,0.35); }
.btn-emp:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* ERROR */
.err { font-size:0.75rem; color:var(--danger); font-family:'DM Mono',monospace; margin-top:0.35rem; min-height:1rem; }

/* ADMIN TOGGLE */
.adm-arrow { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--muted); transition:transform 0.2s; }
.adm-arrow.open { transform:rotate(180deg); }


/* LOADING */
#loader {
  position:fixed; inset:0; z-index:999;
  background:rgba(10,13,18,0.92); backdrop-filter:blur(12px);
  display:none; align-items:center; justify-content:center; flex-direction:column; gap:1rem;
}
#loader.show { display:flex; }
.spinner { width:44px; height:44px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.load-txt { font-family:'DM Mono',monospace; font-size:0.82rem; color:var(--muted); }

footer {
  position:relative; z-index:10; text-align:center; padding:0.85rem;
  font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--muted);
  border-top:1px solid var(--border);
}

/* Mobile first */
@media(max-width:600px) {
  header { padding:0 1rem; height:auto; min-height:56px; flex-wrap:wrap; gap:0.5rem; padding-top:0.5rem; padding-bottom:0.5rem; }
  .h-left { gap:0.5rem; }
  .h-logo { height:28px; width:54px; }
  .h-brand { font-size:0.9rem; }
  .h-div { display:none; }
  .h-contact { display:none; }
  .clock { font-size:0.65rem; }
  main { padding:1rem; align-items:flex-start; padding-top:1.5rem; }
  .wrap { padding:0; }
  .login-box { width:100%; }
  .card { padding:1.25rem; }
  footer { font-size:0.62rem; padding:0.65rem; }
}
@media(min-width:601px) {
  .login-box { width:380px; margin:0 auto; }
}
</style>
</head>

<script>
// ── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now  = new Date();
  const time = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
  const day  = now.toLocaleDateString('en-IN',{weekday:'long',timeZone:'Asia/Kolkata'});
  const date = now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',timeZone:'Asia/Kolkata'});
  document.getElementById('clk').innerHTML =
    '<div style="color:var(--text);font-weight:500">' + time + ' IST</div>' +
    '<div style="color:var(--muted);font-size:0.65rem;margin-top:1px">' + day + ' · ' + date + '</div>';
}
setInterval(updateClock, 1000);
updateClock();

// ── EMPLOYEE LOGIN ─────────────────────────────────────────────────────────
async function empLogin() {
  const code = document.getElementById('empCode').value.trim().toUpperCase();
  if (!code) { document.getElementById('empErr').textContent = 'Please enter your employee code.'; return; }

  const btn = document.getElementById('empBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Checking…';
  document.getElementById('empErr').textContent = '';

  try {
    const res = await fetch('https://trustwork-attendx.hf.space/employees/bycode/' + code);
    const data = await res.json();

    if (res.ok && data.id) {
      sessionStorage.setItem('employeeId',   data.id);
      sessionStorage.setItem('employeeName', data.name);
      sessionStorage.setItem('employeeCode', data.emp_code);
      sessionStorage.setItem('employeeDept', data.department || '');
      document.getElementById('loadTxt').textContent = 'Welcome ' + data.name + '! Loading…';
      document.getElementById('loader').classList.add('show');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } else {
      const msg = (data.detail && data.detail.message) ? data.detail.message : ('Code "' + code + '" not found.');
      document.getElementById('empErr').textContent = msg;
      btn.disabled = false;
      btn.textContent = 'Continue as Employee';
    }
  } catch(e) {
    document.getElementById('empErr').textContent = 'Cannot reach server. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Continue as Employee';
  }
}


</script>
